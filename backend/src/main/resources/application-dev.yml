# =========================
# DEVELOPMENT CONFIGURATION
# =========================
# Local development profile for backend service.
# Environment variables are required explicitly.

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: app
    default-schema: app
    create-schemas: true
    validate-on-migrate: false
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
    at.campus.backend: DEBUG
    org.flywaydb: INFO