services:
  # ==================================================
  # PostgreSQL database
  # ==================================================
  postgres:
    image: postgres:14.11
    container_name: campus-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ${DB_NAME:?DB_NAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - campus-net

  # ==================================================
  # Backend service
  # ==================================================
  backend:
    build: ./backend
    container_name: campus-backend

    environment:
      SPRING_PROFILES_ACTIVE: ${BACKEND_PROFILE:?BACKEND_PROFILE is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "8080"

    volumes:
      - course-materials:/data/course-materials

    networks:
      - campus-net

  # ==================================================
  # Importer service (one-shot)
  # ==================================================
  importer:
    build: ./importer
    container_name: campus-importer
    restart: "no"

    environment:
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DATA_FILE: /data/hcw_courses.json

    volumes:
      - importer-data:/data

    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - campus-net

  # ==================================================
  # Authentication service
  # ==================================================
  auth:
    build: ./auth
    container_name: campus-auth

    environment:
      SPRING_PROFILES_ACTIVE: ${AUTH_PROFILE:?AUTH_PROFILE is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:?JWT_EXPIRATION is required}

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "8080"

    networks:
      - campus-net

  # ==================================================
  # Frontend
  # ==================================================
  frontend:
    build:
      context: ./frontend
      args:
        HOST: ${HOST:?HOST is required}

    container_name: campus-frontend

    networks:
      - campus-net

  # ==================================================
  # NGINX reverse proxy
  # ==================================================
  nginx:
    build: ./nginx
    container_name: campus-nginx

    ports:
      - "80:80"

    depends_on:
      frontend:
        condition: service_started
      auth:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - campus-net

# ==================================================
# Shared Docker network
# ==================================================
networks:
  campus-net:
    driver: bridge

# ==================================================
# Named volumes
# ==================================================
volumes:
  postgres-data:
  importer-data:
  course-materials: