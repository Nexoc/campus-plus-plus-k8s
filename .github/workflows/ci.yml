name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ==================================================
  # AUTH – UNIT TESTS + COVERAGE
  # ==================================================
  auth-tests:
    name: Auth - Unit Tests & Coverage
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run auth unit tests
        working-directory: auth
        run: mvn test

      - name: Publish JaCoCo coverage summary
        working-directory: auth
        continue-on-error: true
        run: |
          echo "## Auth module - test coverage" >> "$GITHUB_STEP_SUMMARY"
          if [ -f target/site/jacoco/index.html ]; then
            grep -A 1 "<tfoot>" target/site/jacoco/index.html \
              | sed -n 's/.*<td class="ctr2">\([0-9]*%\)<\/td>.*/Coverage: \1/p' \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "JaCoCo report not found" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ==================================================
  # BACKEND – BUILD ONLY
  # ==================================================
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: auth-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend (skip tests)
        working-directory: backend
        run: mvn -DskipTests package

  # ==================================================
  # DOCKER COMPOSE – SMOKE TEST
  # ==================================================
  docker-compose:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: backend-build

    env:
      BACKEND_PROFILE: dev
      AUTH_PROFILE: dev

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: campus
      DB_USERNAME: campus
      DB_PASSWORD: campus

      JWT_SECRET: dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQ=
      JWT_EXPIRATION: "60"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for auth service (docker health)
        run: |
          echo "Waiting for auth container to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' campus-auth 2>/dev/null || echo "starting")
            echo "Auth status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Auth container is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Auth container did not become healthy"
          docker compose logs auth
          exit 1

      - name: Wait for backend service (docker health)
        run: |
          echo "Waiting for backend container to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' campus-backend 2>/dev/null || echo "starting")
            echo "Backend status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend container is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend container did not become healthy"
          docker compose logs backend
          exit 1

      - name: Wait for importer to finish successfully
        run: |
          echo "Waiting for importer container to finish..."
          for i in {1..40}; do
            STATUS=$(docker inspect --format='{{.State.Status}}' campus-importer 2>/dev/null || echo "missing")
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' campus-importer 2>/dev/null || echo "unknown")
            echo "Importer status: $STATUS, exit code: $EXIT_CODE"

            if [ "$STATUS" = "exited" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Importer finished successfully"
                exit 0
              fi
              echo "Importer exited with non-zero status"
              docker compose logs importer
              exit 1
            fi

            sleep 3
          done

          echo "Importer did not finish in time"
          docker compose logs importer
          exit 1

      - name: Validate nginx config
        run: docker exec campus-nginx nginx -t

      - name: Smoke test via nginx
        run: curl -fsS http://localhost/ > /dev/null

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show all service logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v