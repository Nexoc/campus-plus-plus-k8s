# Keep this workflow name stable.
# deploy-dev.yml listens to "CI Pipeline" via workflow_run.
name: CI Pipeline

on:
  # main is the DEV auto-deploy branch:
  # successful pushes publish images and then trigger the S5 deploy workflow.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ==================================================
# REQUIRED FOR GHCR PUSH
# contents: read   -> allows repository checkout/read
# packages: write  -> allows pushing images to GHCR
# packages: write is defined at workflow level because the image publish job
# shares the same workflow file as the test/build jobs.
# ==================================================
permissions:
  contents: read
  packages: write

jobs:
  # ==================================================
  # AUTH – UNIT TESTS + COVERAGE
  # Runs auth module unit tests with test profile
  # ==================================================
  auth-tests:
    name: Auth - Unit Tests & Coverage
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run auth unit tests
        working-directory: auth
        run: mvn test

      - name: Publish JaCoCo coverage summary
        working-directory: auth
        continue-on-error: true
        run: |
          echo "## Auth module - test coverage" >> "$GITHUB_STEP_SUMMARY"
          if [ -f target/site/jacoco/index.html ]; then
            grep -A 1 "<tfoot>" target/site/jacoco/index.html \
              | sed -n 's/.*<td class="ctr2">\([0-9]*%\)<\/td>.*/Coverage: \1/p' \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "JaCoCo report not found" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ==================================================
  # BACKEND – BUILD ONLY
  # Builds backend artifact after auth tests passed
  # ==================================================
  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: auth-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend (skip tests)
        working-directory: backend
        run: mvn -DskipTests package

  # ==================================================
  # DOCKER COMPOSE – SMOKE TEST
  # Starts the full local stack in CI and checks:
  # - auth becomes healthy
  # - backend becomes healthy
  # - importer finishes successfully
  # - nginx config is valid
  # - nginx answers on localhost
  # ==================================================
  docker-compose:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: backend-build

    env:
      # CI-only deterministic runtime inputs for the smoke stack.
      # These values are not the Kubernetes DEV secrets/config.
      BACKEND_PROFILE: dev
      AUTH_PROFILE: dev

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: campus
      DB_USERNAME: campus
      DB_PASSWORD: campus

      JWT_SECRET: dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQ=
      JWT_EXPIRATION: "60"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for auth service (docker health)
        run: |
          echo "Waiting for auth container to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' campus-auth 2>/dev/null || echo "starting")
            echo "Auth status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Auth container is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Auth container did not become healthy"
          docker compose logs auth
          exit 1

      - name: Wait for backend service (docker health)
        run: |
          echo "Waiting for backend container to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' campus-backend 2>/dev/null || echo "starting")
            echo "Backend status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend container is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend container did not become healthy"
          docker compose logs backend
          exit 1

      - name: Wait for importer to finish successfully
        run: |
          echo "Waiting for importer container to finish..."
          for i in {1..40}; do
            STATUS=$(docker inspect --format='{{.State.Status}}' campus-importer 2>/dev/null || echo "missing")
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' campus-importer 2>/dev/null || echo "unknown")
            echo "Importer status: $STATUS, exit code: $EXIT_CODE"

            if [ "$STATUS" = "exited" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Importer finished successfully"
                exit 0
              fi
              echo "Importer exited with non-zero status"
              docker compose logs importer
              exit 1
            fi

            sleep 3
          done

          echo "Importer did not finish in time"
          docker compose logs importer
          exit 1

      - name: Validate nginx config
        run: docker exec campus-nginx nginx -t

      - name: Smoke test via nginx
        run: curl -fsS http://localhost/ > /dev/null

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show all service logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ==================================================
  # BUILD AND PUSH IMAGES TO GHCR
  # Runs only on push to main, not on pull requests
  #
  # Result:
  # - builds deployable images
  # - pushes them to GHCR
  # - tags each image with:
  #   1) immutable sha-<shortsha>
  #   2) moving dev-latest
  #
  # This is the first step toward:
  # GitHub -> tests -> build -> GHCR -> deploy to S5
  # ==================================================
  build-and-push-images:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    needs: docker-compose
    # Image publication happens only for the branch that feeds DEV auto-deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry using the workflow token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io

          # The username used to authenticate to GHCR.
          # github.actor is the account that triggered the workflow
          # (for example, the user who pushed the commit).
          username: ${{ github.actor }}

          # The password used to authenticate to GHCR.
          # secrets.GITHUB_TOKEN is an automatically provided temporary token
          # for this workflow run. It acts like the password here.
          password: ${{ secrets.GITHUB_TOKEN }}


      # Compute the immutable deployment tag from the current commit SHA.
      # deploy-dev.yml derives the same sha-<shortsha> value for auto-deploy.
      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      # --------------------------------------------------
      # FRONTEND IMAGE
      # Every deployable image gets the same immutable commit tag
      # so a rollout always uses one coherent build set.
      # --------------------------------------------------
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/nexoc/campus-frontend:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/nexoc/campus-frontend:dev-latest

      # --------------------------------------------------
      # AUTH IMAGE
      # --------------------------------------------------
      - name: Build and push auth
        uses: docker/build-push-action@v6
        with:
          context: ./auth
          push: true
          tags: |
            ghcr.io/nexoc/campus-auth:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/nexoc/campus-auth:dev-latest

      # --------------------------------------------------
      # BACKEND IMAGE
      # --------------------------------------------------
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/nexoc/campus-backend:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/nexoc/campus-backend:dev-latest

      # --------------------------------------------------
      # NGINX IMAGE
      # --------------------------------------------------
      - name: Build and push campus-nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/nexoc/campus-nginx:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/nexoc/campus-nginx:dev-latest

      # --------------------------------------------------
      # IMPORTER IMAGE
      # --------------------------------------------------
      - name: Build and push importer
        uses: docker/build-push-action@v6
        with:
          context: ./importer
          push: true
          tags: |
            ghcr.io/nexoc/campus-importer:${{ steps.meta.outputs.sha_tag }}
            ghcr.io/nexoc/campus-importer:dev-latest
