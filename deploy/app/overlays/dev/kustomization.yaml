apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base application manifests shared across environments
resources:
  - ../../base

# All rendered resources from this overlay will be placed into the DEV namespace
namespace: campus-dev

# Keep generated ConfigMap/Secret names stable
# so references do not get hash suffixes
generatorOptions:
  disableNameSuffixHash: true

# Non-secret runtime configuration for services
configMapGenerator:
  - name: auth-config
    envs:
      - config/auth-config.env

  - name: backend-config
    envs:
      - config/backend-config.env

  - name: importer-config
    envs:
      - config/importer-config.env

# Secret values loaded from local env files
# Real secret values must not be committed to git
secretGenerator:
  - name: db-secrets
    envs:
      - secrets/db-secrets.env
    type: Opaque

  - name: auth-secrets
    envs:
      - secrets/auth-secrets.env
    type: Opaque

# Rewrite logical image names from base manifests
# to real GHCR images used by the DEV environment
images:
  - name: campus-frontend
    newName: ghcr.io/nexoc/campus-frontend
    newTag: dev-latest

  - name: campus-auth
    newName: ghcr.io/nexoc/campus-auth
    newTag: dev-latest

  - name: campus-backend
    newName: ghcr.io/nexoc/campus-backend
    newTag: dev-latest

  - name: campus-nginx
    newName: ghcr.io/nexoc/campus-nginx
    newTag: dev-latest

  - name: campus-importer
    newName: ghcr.io/nexoc/campus-importer
    newTag: dev-latest

# Strategic merge patches for normal Kubernetes resources
# - replicas-patch.yaml adjusts DEV replica counts
# - ingress-patch.yaml overrides DEV ingress settings
# - image-pull-policy-patch.yaml forces Always pull policy in DEV
patchesStrategicMerge:
  - replicas-patch.yaml
  - ingress-patch.yaml
  - image-pull-policy-patch.yaml

# JSON 6902 patch for Namespace object
# This is kept separate because namespace-patch.yaml uses JSON patch syntax
patchesJson6902:
  - target:
      version: v1
      kind: Namespace
      name: campus
    path: namespace-patch.yaml