apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ==================================================
# Base application manifests
# We reuse the common app layer from ../../base
# and override only what is specific for DEV
# ==================================================
resources:
  - ../../base

# ==================================================
# All resources from this overlay will be placed
# into the DEV namespace
# ==================================================
namespace: campus-dev

# ==================================================
# Keep generated ConfigMap/Secret names stable
# Without hash suffixes, references remain predictable
# This is useful for a simple controlled rollout path
# ==================================================
generatorOptions:
  disableNameSuffixHash: true

# ==================================================
# CONFIGMAPS
# Non-sensitive runtime configuration for services
# These values are safe application config, not secrets
# ==================================================
configMapGenerator:
  - name: auth-config
    envs:
      - config/auth-config.env

  - name: backend-config
    envs:
      - config/backend-config.env

  - name: importer-config
    envs:
      - config/importer-config.env

# ==================================================
# SECRETS
# Sensitive values are generated from local env files
# Do NOT store real production secrets in git
# ==================================================
secretGenerator:
  - name: db-secrets
    envs:
      - secrets/db-secrets.env
    type: Opaque

  - name: auth-secrets
    envs:
      - secrets/auth-secrets.env
    type: Opaque

# ==================================================
# IMAGE OVERRIDES FOR DEV
#
# Base manifests currently use logical image names like:
#   campus-frontend
#   campus-auth
#   campus-backend
#   campus-nginx
#   campus-importer
#
# Here we rewrite them to real GHCR image names
# and point DEV to the moving tag dev-latest.
#
# Later, for stricter deployments, you can switch
# from dev-latest to an immutable sha-... tag.
# ==================================================
images:
  - name: campus-frontend
    newName: ghcr.io/nexoc/campus-frontend
    newTag: dev-latest

  - name: campus-auth
    newName: ghcr.io/nexoc/campus-auth
    newTag: dev-latest

  - name: campus-backend
    newName: ghcr.io/nexoc/campus-backend
    newTag: dev-latest

  - name: campus-nginx
    newName: ghcr.io/nexoc/campus-nginx
    newTag: dev-latest

  - name: campus-importer
    newName: ghcr.io/nexoc/campus-importer
    newTag: dev-latest

# ==================================================
# PATCHES
# DEV-specific overrides:
# - lower replica counts
# - dev ingress host/settings
# - namespace metadata patch
# ==================================================
patches:
  - path: replicas-patch.yaml
  - path: ingress-patch.yaml
  - path: namespace-patch.yaml
  - path: image-pull-policy-patch.yaml
    target:
      version: v1
      kind: Namespace
      name: campus