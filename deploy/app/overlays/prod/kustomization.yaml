apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: campus-prod

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: auth-config
    envs:
      - config/auth-config.env

  - name: backend-config
    envs:
      - config/backend-config.env

  - name: importer-config
    envs:
      - config/importer-config.env

# Secret values loaded from local env files.
# Create these local files from deploy/templates/secrets/*.env.example.
# Real secret values must not be committed to git.
secretGenerator:
  - name: db-secrets
    envs:
      - secrets/db-secrets.env
    type: Opaque

  - name: auth-secrets
    envs:
      - secrets/auth-secrets.env
    type: Opaque

# Production should deploy from GHCR using pinned immutable tags.
# Replace `sha-change-me` with the selected release tag before applying PROD.
images:
  - name: campus-frontend
    newName: ghcr.io/nexoc/campus-frontend
    newTag: sha-change-me

  - name: campus-auth
    newName: ghcr.io/nexoc/campus-auth
    newTag: sha-change-me

  - name: campus-backend
    newName: ghcr.io/nexoc/campus-backend
    newTag: sha-change-me

  - name: campus-nginx
    newName: ghcr.io/nexoc/campus-nginx
    newTag: sha-change-me

  - name: campus-importer
    newName: ghcr.io/nexoc/campus-importer
    newTag: sha-change-me

patches:
  - path: replicas-patch.yaml
  - path: ingress-patch.yaml
  - path: namespace-patch.yaml
    target:
      version: v1
      kind: Namespace
      name: campus
