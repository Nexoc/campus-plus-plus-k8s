apiVersion: batch/v1
kind: Job
metadata:
  name: campus-importer
  labels:
    app.kubernetes.io/name: campus-importer
    app.kubernetes.io/component: importer
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: campus-importer
        app.kubernetes.io/component: importer
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      containers:
        - name: importer
          image: campus-importer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: importer-config
            - secretRef:
                name: db-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi