apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-nginx
  labels:
    app.kubernetes.io/name: campus-nginx
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: campus-nginx
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: campus-nginx
        app.kubernetes.io/component: gateway
    spec:
      automountServiceAccountToken: false
      containers:
        - name: campus-nginx
          image: campus-nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi