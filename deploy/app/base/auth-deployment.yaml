apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/component: auth
    spec:
      automountServiceAccountToken: false
      containers:
        - name: auth
          image: campus-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: db-secrets
            - secretRef:
                name: auth-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            timeoutSeconds: 2
            periodSeconds: 20
          # Auth can take noticeably longer to boot on the small DEV node, so
          # gate readiness/liveness with a startup probe and avoid restart loops.
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
