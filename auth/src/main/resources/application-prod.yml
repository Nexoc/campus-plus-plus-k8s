# =========================
# PRODUCTION CONFIGURATION
# =========================
# Used in real production environments.
# Sensitive values must be provided via environment variables.

spring:
  config:
    activate:
      on-profile: prod

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
    at.campus.auth: INFO
    org.springframework.security: WARN